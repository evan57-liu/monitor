# 环境变量前缀：DM_
# 任何配置项均可通过 DM_ 前缀 + SCREAMING_SNAKE_CASE 键路径的环境变量覆盖
# 例如：DM_GLOBAL_DRY_RUN=false 可覆盖 global.dry_run

global:
  # ⚠️  上线前必须设为 true，完成三阶段测试后再改为 false
  # true 时的行为：
  #   - 数据采集、告警逻辑、通知（Server酱/Email）均正常运行
  #   - 执行器替换为 DryRunExecutor，只记录日志，不发送任何链上交易
  dry_run: false
  log_level: "debug" # debug（最详细，开发/调试时用）| info | warn | error

sources:
  coingecko:
    base_url: "https://pro-api.coingecko.com/api/v3"
    rate_limit_per_minute: 500 # Pro 计划一般 500/min，无需修改
    timeout_ms: 10000 # 单次请求超时：10 秒
    retry_attempts: 3 # 失败后最多重试 3 次（指数退避）
  debank:
    base_url: "https://pro-openapi.debank.com/v1"
    timeout_ms: 15000 # DeBank 响应较慢，给 15 秒
    retry_attempts: 3
  rpc:
    base:
      url: "https://mainnet.base.org" # 免费公共 RPC，足够日常使用
      # 如果公共节点不稳定，可在 configs/.env 中设置：
      # DM_RPC_BASE_URL=https://你的私有RPC节点
      timeout_ms: 10000
      retry_attempts: 3

notifications:
  serverchan:
    enabled: false
    timeout_ms: 5000
    retry_attempts: 5 # 失败后重试 5 次，确保告警送达
  email:
    enabled: true
    smtp_host: "smtp.gmail.com"
    smtp_port: 465
    from: "liulei552211@gmail.com"
    to:
      - "liuchonglin1@gmail.com" # 可填多个收件人，每行一个 "- 地址"
    retry_attempts: 5
    daily_summary_hour: 9 # 每天 9 点发送每日运营总结邮件
  healthchecks:
    enabled: true
    interval_seconds: 240 # 每 240 秒发一次心跳；超时未收到心跳则发邮件告警
    # 配置步骤：
    # 1. 在 https://healthchecks.io 创建新 Check，Period=5min，Grace=5min
    # 2. 复制 Ping URL 填入 configs/.env 的 DM_HEALTHCHECKS_PING_URL

protocols:
  aerodrome_msusd_usdc:
    enabled: true
    chain: "base"
    chain_id: 8453

    # 在 Basescan / Aerodrome UI 上查找这些地址
    pool_address: "0x7501bc8bb51616f79bfa524e464fb7b41f0b10fb" # Aerodrome msUSD/USDC 池
    gauge_address: "0x3d86AED6eCC8dAf71C8b50d06f38455b663265d8" # 用于质押 LP NFT 的 Gauge 合约
    msusd_address: "0x526728dbc96689597f85ae4cd716d4f7fccbae9d" # Base 链上的 msUSD 代币
    usdc_address: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913" # Base 链上的 USDC（固定地址）
    router_address: "0x6Df1c91424F79E40E33B1A48F0687B666bE71075" # Aerodrome Universal Router（固定地址）
    position_manager_address: "0x827922686190790b37229fd06084350E74485b72" # Aerodrome NonfungiblePositionManager（固定地址）
    # Aerodrome 自部署的 Permit2 fork（与官方 0x000…022D 不同，两者不可互换）
    permit2_address: "0x494bbd8a3302aca833d307d11838f18dbada9c25"

    # ⚠️  必须填入你的真实 LP NFT Token ID
    # 获取方式：Aerodrome UI → Positions → 找到 msUSD/USDC 仓位右侧显示的 ID
    # 或在 Basescan 搜索钱包地址 → ERC-721 Tokens → Aerodrome NFT
    #lp_token_id: 62910768
    lp_token_id: 69680675

    # DeBank Pro API 的协议 ID（用于查询你的 LP 仓位价值）
    # 验证方式：curl 'https://pro-openapi.debank.com/v1/user/protocol?id=<钱包地址>&protocol_id=base_aerodrome3' -H 'AccessKey: ...'
    # 若返回 portfolio_item_list 为 null 或 []，说明 ID 不对；可在 DeBank App 找到对应协议页面的 URL slug
    debank_protocol_id: "base_aerodrome3"

    # DeBank 上 Metronome Synth 协议的 ID 列表（用于 liquidity_drain 告警监控 TVL）
    # 支持多链：各链 TVL 会累加后用于告警判断
    # 验证方式：curl 'https://pro-openapi.debank.com/v1/protocol?id=<id>' -H 'AccessKey: ...'
    # 在 DeBank App 搜索 Metronome，从协议页面 URL 找到正确的 slug
    metronome_protocol_ids:
      - "metronome"  # ETH 主链（msUSD 主发行链）
      - "base_metronome" # Base 链

    # Metronome 团队/国库钱包（用于内部人退出检测）
    # 留空则 insider_exit 告警不会触发
    team_wallets:
      []

    polling:
      market_ms: 60000 # 60秒 — CoinGecko 价格 + 链上 TWAP + 池子储备/买卖量（一次 getPoolData 请求）
      supply_ms: 60000 # 60秒 — 通过 RPC 获取 totalSupply（检测黑客铸造）
      position_ms: 60000 # 60秒 — 通过 DeBank 获取你的仓位价值
      protocol_ms: 120000 # 2分钟 — Metronome 协议 TVL（检测流动性枯竭）
      team_wallets_ms: 120000 # 2分钟 — 团队钱包持仓（检测内部人撤离）

    alerts:
      depeg:
        price_threshold: 0.986797 # CoinGecko 价格低于此值时触发预警
        twap_threshold: 0.986797 # 链上 TWAP 低于此值作为第二确认
        pool_imbalance_pct: 75 # 池中 msUSD 占比 > 75% 作为第三确认（单边失衡）
        sustained_seconds: 180 # 达到 required_confirmations 后，持续 3 分钟才升级为 RED
        required_confirmations: 3 # 4 个独立数据源（coingecko/twap/pool-imbalance/debank），4 中取 3

      hack_mint:
        supply_increase_pct: 15 # 在 supply_window_seconds 窗口内 totalSupply 增加 > 15% 触发
        supply_window_seconds: 3600 # 窗口：取 SQLite 中 recorded_at <= now-1h 的最近一条与当前值比对
        price_drop_pct: 2 # 同时价格下跌 > 2%（铸币后抛售导致）
        sells_spike_multiplier: 5 # 同时卖出量是正常水平的 5 倍

      liquidity_drain:
        tvl_drop_pct: 30 # 在 tvl_window_seconds 窗口内 Metronome 协议 TVL 下降 > 30% 触发
        tvl_window_seconds: 3600 # 窗口：取 SQLite 中 recorded_at <= now-1h 的最近一条与当前值比对
        pool_msusd_ratio_pct: 70 # 池子 msUSD 占比 > 70%（USDC 被大量抽走）
        sells_buys_ratio: 3 # 卖出/买入比 > 3（恐慌性出逃）

      insider_exit:
        large_outflow_usd: 50000 # 任一团队钱包单次 msUSD 转出 > $50,000
        price_drop_pct: 1 # 同时价格下跌 > 1%

      position_drop:
        drop_pct: 0.01 # 在 window_seconds 窗口内 LP 仓位价值下跌 > 此百分比触发
        window_seconds: 3600 # 窗口：取 SQLite 中 recorded_at <= now-1h 的最近一条与当前值比对（最后防线）
        sustained_seconds: 1 # 持续满足此秒数才升 RED，防止瞬间误触
        required_confirmations: 1 # 仅 DeBank 一个数据源

    execution:
      swap_batch_count: 1 # 分 3 批兑换 msUSD → USDC，批次之间重新检查价格地板
      swap_slippage_bps: 100 # 最大允许滑点：1%（100 bps = 1%）
      # poolParam = tickSpacing（低 20 位）| factorySelector（高 4 位，0 = CL_FACTORY_1 / 0x100000 = CL_FACTORY_2 / 0x200000 = CL_FACTORY_3）
      # 0x32 = 50（tickSpacing=50，factorySelector=0 → 默认 CL_FACTORY_1），与上方 pool_address 0x7501... 所属工厂/参数一致
      swap_pool_param: 0x32
      gas_multiplier: 1.2 # Gas 估算结果乘以 1.2 倍，确保交易及时打包
      deadline_seconds: 300 # 交易有效期：5 分钟，超时自动失效
      max_gas_gwei: 50 # Gas 价格上限：超过 50 gwei 则拒绝执行，等待网络拥堵缓解
      min_price_to_swap: 0.92 # 价格地板：max(coingecko,twap,debank) < 此值时中止所有撤出操作
      price_floor_required: true # fail-closed：三个价格源全部不可用时也中止撤出（设为 false 则三源全失败时强制继续）

storage:
  sqlite_path: "data/monitor.db"
  retention_days:
    price_history: 30 # 价格记录保留 30 天
    pool_snapshots: 30 # 池子快照保留 30 天
    health_snapshots: 7 # 健康状态快照保留 7 天
    tvl_history: 30 # protocol_tvl_history 表保留 30 天（供 liquidity_drain 窗口查询）
    position_history: 30 # position_history 表保留 30 天（供 position_drop 窗口查询）
